<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ローマ字れんしゅう 🌍 国の名前</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue: #2196F3;
  --blue-dark: #1565C0;
  --blue-light: #BBDEFB;
  --orange: #FF9800;
  --orange-dark: #E65100;
  --green: #4CAF50;
  --green-light: #C8E6C9;
  --red: #F44336;
  --red-light: #FFCDD2;
  --bg: #E3F2FD;
  --white: #FFFFFF;
  --gray: #ECEFF1;
  --gray-dark: #607D8B;
  --text: #263238;
}

html, body {
  width: 100%; height: 100%;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

/* ============ TITLE SCREEN ============ */
#title-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 20px; padding: 20px;
  background: linear-gradient(135deg, #1976D2 0%, #42A5F5 50%, #90CAF9 100%);
}
#title-screen h1 {
  font-size: clamp(28px, 6vw, 48px); color: #FFF;
  text-shadow: 2px 3px 0 rgba(0,0,0,0.15);
  text-align: center; line-height: 1.3;
}
#title-screen .subtitle {
  font-size: clamp(14px, 3vw, 20px); color: rgba(255,255,255,0.85);
  margin-top: -10px;
}
.globe-emoji { font-size: clamp(60px, 15vw, 100px); }
.course-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
.course-btn {
  padding: 18px 36px; border: none; border-radius: 16px;
  font-family: inherit; font-size: clamp(18px, 4vw, 26px); font-weight: 800;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 6px 20px rgba(0,0,0,0.15);
  min-width: 200px; text-align: center;
}
.course-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
.btn-lower { background: var(--orange); color: #FFF; }
.btn-upper { background: var(--green); color: #FFF; }

/* ============ GAME SCREEN ============ */
#game-screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }

/* Top bar */
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px; background: var(--blue);
  color: #FFF; font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.top-bar .course-label {
  background: rgba(255,255,255,0.2); padding: 4px 12px;
  border-radius: 20px; font-size: 13px;
}
.top-bar .progress { font-size: 15px; }
.top-bar .home-btn {
  background: rgba(255,255,255,0.2); border: none; color: #FFF;
  padding: 6px 12px; border-radius: 8px; font-family: inherit;
  font-size: 13px; font-weight: 700; cursor: pointer;
}

/* Score bar */
.score-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 16px; background: var(--blue-dark);
  color: #FFF; font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.score-item { display: flex; align-items: center; gap: 6px; }
.score-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 14px; font-weight: 800;
}
.badge-input { background: var(--orange); }
.badge-miss { background: var(--red); }

/* Display area */
.display-area {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 12px 16px; gap: 8px;
  min-height: 0;
}
.flag-display { font-size: clamp(50px, 12vw, 80px); line-height: 1; }
.country-name {
  font-size: clamp(20px, 5vw, 32px); font-weight: 900;
  text-align: center; line-height: 1.3;
}
.country-reading {
  font-size: clamp(16px, 3.5vw, 22px); color: var(--gray-dark);
  font-weight: 700;
}

/* Romaji display */
.romaji-box {
  background: var(--white); border: 3px solid var(--blue);
  border-radius: 16px; padding: 12px 20px;
  min-width: 280px; max-width: 95%; text-align: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  position: relative; overflow: hidden;
}
.romaji-text {
  font-size: clamp(24px, 6vw, 40px); font-weight: 900;
  letter-spacing: 3px; word-break: break-all;
  font-family: 'Courier New', monospace;
}
.romaji-text .typed { color: var(--green); }
.romaji-text .current { 
  color: var(--orange); 
  text-decoration: underline;
  text-underline-offset: 4px;
  animation: pulse 0.8s ease-in-out infinite;
}
.romaji-text .remaining { color: #B0BEC5; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Navigation arrows */
.nav-area {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 8px; flex-shrink: 0;
}
.nav-btn {
  background: var(--blue); color: #FFF; border: none;
  border-radius: 12px; padding: 10px 16px;
  font-family: inherit; font-size: 13px; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; gap: 4px;
  box-shadow: 0 3px 0 var(--blue-dark);
  transition: transform 0.1s;
}
.nav-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--blue-dark); }
.nav-btn:disabled { opacity: 0.4; cursor: default; }

/* Keyboard */
.keyboard {
  padding: 6px 4px 12px; background: #CFD8DC;
  border-top: 2px solid #B0BEC5; flex-shrink: 0;
}
.kb-row {
  display: flex; justify-content: center; gap: 3px; margin-bottom: 3px;
}
.kb-key {
  display: flex; align-items: center; justify-content: center;
  background: var(--white); border: 1px solid #B0BEC5;
  border-radius: 6px; font-family: 'Courier New', monospace;
  font-size: clamp(14px, 3.5vw, 20px); font-weight: 700;
  min-width: clamp(26px, 7vw, 38px); height: clamp(36px, 9vw, 48px);
  cursor: pointer; transition: background 0.1s, transform 0.08s;
  box-shadow: 0 2px 0 #B0BEC5;
  -webkit-tap-highlight-color: transparent;
}
.kb-key:active { transform: translateY(1px); box-shadow: 0 1px 0 #B0BEC5; }
.kb-key.highlight {
  background: var(--orange); color: #FFF; border-color: var(--orange-dark);
  box-shadow: 0 2px 0 var(--orange-dark);
  animation: keyPulse 0.6s ease-in-out infinite;
}
@keyframes keyPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
.kb-key.correct {
  background: var(--green-light); border-color: var(--green);
  animation: none;
}
.kb-key.wrong {
  background: var(--red-light); border-color: var(--red);
  animation: shake 0.3s; 
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.kb-key.space {
  min-width: clamp(120px, 30vw, 200px);
  font-size: clamp(11px, 2.5vw, 14px);
}
.kb-key.wide { min-width: clamp(40px, 10vw, 60px); font-size: clamp(10px, 2.5vw, 14px); }
.kb-key.backspace { min-width: clamp(50px, 12vw, 70px); font-size: clamp(10px, 2.5vw, 14px); }

/* ============ RESULT SCREEN ============ */
#result-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 20px; padding: 20px;
  background: linear-gradient(135deg, #1B5E20 0%, #43A047 50%, #81C784 100%);
}
#result-screen h1 { font-size: clamp(28px, 6vw, 42px); color: #FFF; text-align: center; }
.result-card {
  background: rgba(255,255,255,0.95); border-radius: 20px;
  padding: 24px 32px; min-width: 260px; text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}
.result-card .stat { font-size: 20px; margin: 10px 0; font-weight: 700; }
.result-card .stat span { font-size: 32px; font-weight: 900; }
.result-btn {
  margin-top: 10px; padding: 14px 32px; border: none; border-radius: 14px;
  font-family: inherit; font-size: 20px; font-weight: 800;
  cursor: pointer; color: #FFF; background: var(--blue);
  box-shadow: 0 4px 0 var(--blue-dark);
}
.result-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--blue-dark); }

/* ============ CELEBRATION ============ */
.celebration {
  position: fixed; inset: 0; pointer-events: none; z-index: 100;
}
.confetti {
  position: absolute; width: 10px; height: 10px; border-radius: 2px;
  animation: confettiFall 1s ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Flash feedback */
.flash-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 50;
  opacity: 0; transition: opacity 0.1s;
}
.flash-overlay.green { background: rgba(76, 175, 80, 0.15); opacity: 1; }
.flash-overlay.red { background: rgba(244, 67, 54, 0.15); opacity: 1; }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="globe-emoji">🌍</div>
  <h1>ローマ字れんしゅう<br>〜国の名前〜</h1>
  <p class="subtitle">勇誠くんのタイピングれんしゅう</p>
  <div class="course-buttons">
    <button class="course-btn btn-lower" onclick="startGame('lower')">
      abc<br><span style="font-size:0.6em">小文字コース</span>
    </button>
    <button class="course-btn btn-upper" onclick="startGame('upper')">
      ABC<br><span style="font-size:0.6em">大文字コース</span>
    </button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="top-bar">
    <button class="home-btn" onclick="goHome()">🏠 もどる</button>
    <span class="course-label" id="course-label">小文字コース</span>
    <span class="progress" id="progress">1 / 56</span>
  </div>
  <div class="score-bar">
    <div class="score-item">入力: <span class="score-badge badge-input" id="input-count">0</span></div>
    <div class="score-item">ミス: <span class="score-badge badge-miss" id="miss-count">0</span></div>
  </div>
  <div class="display-area">
    <div class="flag-display" id="flag-display">🇯🇵</div>
    <div class="country-name" id="country-name">日本</div>
    <div class="country-reading" id="country-reading">ニホン</div>
    <div class="romaji-box">
      <div class="romaji-text" id="romaji-display"></div>
    </div>
  </div>
  <div class="nav-area">
    <button class="nav-btn" id="prev-btn" onclick="prevCountry()">◀ 前</button>
    <button class="nav-btn" id="next-btn" onclick="nextCountry()">次 ▶</button>
  </div>
  <div class="keyboard" id="keyboard"></div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <h1>🎉 おつかれさま！</h1>
  <div class="result-card">
    <div class="stat">入力数: <span id="result-input" style="color:#FF9800">0</span></div>
    <div class="stat">ミス数: <span id="result-miss" style="color:#F44336">0</span></div>
    <div class="stat">正確さ: <span id="result-accuracy" style="color:#4CAF50">100%</span></div>
  </div>
  <button class="result-btn" onclick="goHome()">🏠 タイトルにもどる</button>
</div>

<div class="flash-overlay" id="flash-overlay"></div>
<div class="celebration" id="celebration"></div>

<script>
// ============ COUNTRY DATA ============
const COUNTRIES = [
  { name: '日本', reading: 'ニホン', romaji: 'nihon', flag: '🇯🇵' },
  { name: 'イギリス', reading: 'イギリス', romaji: 'igirisu', flag: '🇬🇧' },
  { name: 'ポーランド', reading: 'ポーランド', romaji: 'poorando', flag: '🇵🇱' },
  { name: 'パキスタン', reading: 'パキスタン', romaji: 'pakisutan', flag: '🇵🇰' },
  { name: 'アイルランド', reading: 'アイルランド', romaji: 'airurando', flag: '🇮🇪' },
  { name: 'ベネズエラ', reading: 'ベネズエラ', romaji: 'benezuera', flag: '🇻🇪' },
  { name: 'トルコ', reading: 'トルコ', romaji: 'toruko', flag: '🇹🇷' },
  { name: 'エチオピア', reading: 'エチオピア', romaji: 'echiopia', flag: '🇪🇹' },
  { name: 'ソマリア', reading: 'ソマリア', romaji: 'somaria', flag: '🇸🇴' },
  { name: 'デンマーク', reading: 'デンマーク', romaji: 'denmaaku', flag: '🇩🇰' },
  { name: 'メキシコ', reading: 'メキシコ', romaji: 'mekishiko', flag: '🇲🇽' },
  { name: 'コロンビア', reading: 'コロンビア', romaji: 'koronbia', flag: '🇨🇴' },
  { name: 'キューバ', reading: 'キューバ', romaji: 'kyuuba', flag: '🇨🇺' },
  { name: 'ウクライナ', reading: 'ウクライナ', romaji: 'ukuraina', flag: '🇺🇦' },
  { name: 'チャド', reading: 'チャド', romaji: 'chado', flag: '🇹🇩' },
  { name: 'カザフスタン', reading: 'カザフスタン', romaji: 'kazafusutan', flag: '🇰🇿' },
  { name: 'ベラルーシ', reading: 'ベラルーシ', romaji: 'beraruushi', flag: '🇧🇾' },
  { name: 'アルバニア', reading: 'アルバニア', romaji: 'arubania', flag: '🇦🇱' },
  { name: 'キプロス', reading: 'キプロス', romaji: 'kipurosu', flag: '🇨🇾' },
  { name: 'イラン', reading: 'イラン', romaji: 'iran', flag: '🇮🇷' },
  { name: 'グリーンランド', reading: 'グリーンランド', romaji: 'guriinrando', flag: '🇬🇱' },
  { name: 'マダガスカル', reading: 'マダガスカル', romaji: 'madagasukaru', flag: '🇲🇬' },
  { name: 'カナダ', reading: 'カナダ', romaji: 'kanada', flag: '🇨🇦' },
  { name: '台湾', reading: 'タイワン', romaji: 'taiwan', flag: '🇹🇼' },
  { name: 'モンゴル', reading: 'モンゴル', romaji: 'mongoru', flag: '🇲🇳' },
  { name: '北朝鮮', reading: 'キタチョウセン', romaji: 'kitachousen', flag: '🇰🇵' },
  { name: 'コソボ', reading: 'コソボ', romaji: 'kosobo', flag: '🇽🇰' },
  { name: 'スカンディナビア', reading: 'スカンディナビア', romaji: 'sukandinabia', flag: '🏔️' },
  { name: '中国', reading: 'チュウゴク', romaji: 'chuugoku', flag: '🇨🇳' },
  { name: 'マジャヒット帝国', reading: 'マジャヒットテイコク', romaji: 'majahittoteikoku', flag: '🏛️' },
  { name: '大ルーマニア', reading: 'ダイルーマニア', romaji: 'dairuumania', flag: '🏛️' },
  { name: 'プロイセン', reading: 'プロイセン', romaji: 'puroisen', flag: '🏛️' },
  { name: 'ポーランド・リトアニア共和国', reading: 'ポーランドリトアニアキョウワコク', romaji: 'poorandoritoaniakyouwakoku', flag: '🏛️' },
  { name: 'ロシア', reading: 'ロシア', romaji: 'roshia', flag: '🇷🇺' },
  { name: 'オーストリア＝ハンガリー二重帝国', reading: 'オーストリアハンガリーニジュウテイコク', romaji: 'oosutoriahangariinijuuteikoku', flag: '🏛️' },
  { name: '神聖ローマ帝国', reading: 'シンセイローマテイコク', romaji: 'shinseiroomateikoku', flag: '🏛️' },
  { name: '清', reading: 'シン', romaji: 'shin', flag: '🏯' },
  { name: '朝鮮', reading: 'チョウセン', romaji: 'chousen', flag: '🏛️' },
  { name: 'ＥＵ', reading: 'イーユー', romaji: 'iiyuu', flag: '🇪🇺' },
  { name: 'アメリカ', reading: 'アメリカ', romaji: 'amerika', flag: '🇺🇸' },
  { name: 'チェコスロバキア', reading: 'チェコスロバキア', romaji: 'chekosurobakia', flag: '🏛️' },
  { name: 'ユーゴスラビア', reading: 'ユーゴスラビア', romaji: 'yuugosurabia', flag: '🏛️' },
  { name: 'アフリカ連合', reading: 'アフリカレンゴウ', romaji: 'afurikarengou', flag: '🌍' },
  { name: 'ペルシア帝国', reading: 'ペルシアテイコク', romaji: 'perushiateikoku', flag: '🏛️' },
  { name: 'オスマン帝国', reading: 'オスマンテイコク', romaji: 'osumanteikoku', flag: '🏛️' },
  { name: 'バチカン', reading: 'バチカン', romaji: 'bachikan', flag: '🇻🇦' },
  { name: '南アメリカ', reading: 'ミナミアメリカ', romaji: 'minamiamerika', flag: '🌎' },
  { name: 'ナトー', reading: 'ナトー', romaji: 'natoo', flag: '🛡️' },
  { name: 'ソビエト連邦', reading: 'ソビエトレンポウ', romaji: 'sobietorenpou', flag: '🏛️' },
  { name: 'ローマ帝国', reading: 'ローマテイコク', romaji: 'roomateikoku', flag: '🏛️' },
  { name: 'ロシア帝国', reading: 'ロシアテイコク', romaji: 'roshiateikoku', flag: '🏛️' },
  { name: 'アトランティス', reading: 'アトランティス', romaji: 'atorantisu', flag: '🔱' },
  { name: 'モンゴル帝国', reading: 'モンゴルテイコク', romaji: 'mongoruteikoku', flag: '🏛️' },
  { name: 'スペイン帝国', reading: 'スペインテイコク', romaji: 'supeinteikoku', flag: '🏛️' },
  { name: '大英帝国', reading: 'ダイエイテイコク', romaji: 'daieiteikoku', flag: '🏛️' },
  { name: 'カタルゴ', reading: 'カタルゴ', romaji: 'katarugo', flag: '🏛️' },
];

// ============ KEYBOARD LAYOUT ============
const KB_ROWS = [
  ['1','2','3','4','5','6','7','8','9','0','-'],
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Z','X','C','V','B','N','M'],
];

// ============ GAME STATE ============
let mode = 'lower'; // 'lower' or 'upper'
let currentIndex = 0;
let typedPos = 0;
let inputCount = 0;
let missCount = 0;
let completed = []; // track which countries are completed
let keyFeedbackTimer = null;

// ============ INITIALIZE ============
function startGame(m) {
  mode = m;
  currentIndex = 0;
  typedPos = 0;
  inputCount = 0;
  missCount = 0;
  completed = new Array(COUNTRIES.length).fill(false);

  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('course-label').textContent = mode === 'lower' ? '小文字コース abc' : '大文字コース ABC';

  buildKeyboard();
  updateDisplay();
  updateScores();
}

function goHome() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
}

// ============ KEYBOARD ============
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach((row, ri) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'kb-key';
      const displayKey = mode === 'lower' ? key.toLowerCase() : key;
      btn.textContent = displayKey;
      btn.dataset.key = key.toLowerCase();
      btn.addEventListener('click', () => handleKey(key.toLowerCase()));
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleKey(key.toLowerCase()); }, { passive: false });
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });
}

// ============ DISPLAY ============
function updateDisplay() {
  const country = COUNTRIES[currentIndex];
  document.getElementById('flag-display').textContent = country.flag;
  document.getElementById('country-name').textContent = country.name;
  document.getElementById('country-reading').textContent = country.reading;
  document.getElementById('progress').textContent = `${currentIndex + 1} / ${COUNTRIES.length}`;

  // Romaji display
  const target = getDisplayRomaji(country.romaji);
  const romajiDiv = document.getElementById('romaji-display');
  let html = '';
  for (let i = 0; i < target.length; i++) {
    if (i < typedPos) {
      html += `<span class="typed">${target[i]}</span>`;
    } else if (i === typedPos) {
      html += `<span class="current">${target[i]}</span>`;
    } else {
      html += `<span class="remaining">${target[i]}</span>`;
    }
  }
  romajiDiv.innerHTML = html;

  // Highlight expected key
  highlightExpectedKey();

  // Nav buttons
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').disabled = currentIndex === COUNTRIES.length - 1 && !completed[currentIndex];
}

function getDisplayRomaji(romaji) {
  return mode === 'upper' ? romaji.toUpperCase() : romaji;
}

function highlightExpectedKey() {
  // Clear all highlights
  document.querySelectorAll('.kb-key').forEach(k => {
    k.classList.remove('highlight', 'correct', 'wrong');
  });

  const country = COUNTRIES[currentIndex];
  if (typedPos < country.romaji.length) {
    const expected = country.romaji[typedPos].toLowerCase();
    const keyEl = document.querySelector(`.kb-key[data-key="${expected}"]`);
    if (keyEl) keyEl.classList.add('highlight');
  }
}

function updateScores() {
  document.getElementById('input-count').textContent = inputCount;
  document.getElementById('miss-count').textContent = missCount;
}

// ============ INPUT HANDLING ============
function handleKey(key) {
  const country = COUNTRIES[currentIndex];
  const target = country.romaji;

  if (typedPos >= target.length) return; // already completed

  inputCount++;
  const expected = target[typedPos].toLowerCase();

  if (key === expected) {
    // Correct!
    typedPos++;
    flashFeedback('green');
    showKeyFeedback(key, 'correct');

    if (typedPos >= target.length) {
      // Word completed!
      completed[currentIndex] = true;
      celebrate();
      setTimeout(() => {
        if (currentIndex < COUNTRIES.length - 1) {
          currentIndex++;
          typedPos = 0;
          updateDisplay();
        } else {
          showResults();
        }
      }, 800);
    } else {
      updateDisplay();
    }
  } else {
    // Wrong!
    missCount++;
    flashFeedback('red');
    showKeyFeedback(key, 'wrong');
  }
  updateScores();
}

function showKeyFeedback(key, type) {
  const keyEl = document.querySelector(`.kb-key[data-key="${key}"]`);
  if (keyEl) {
    keyEl.classList.remove('highlight', 'correct', 'wrong');
    keyEl.classList.add(type);
    clearTimeout(keyFeedbackTimer);
    keyFeedbackTimer = setTimeout(() => {
      keyEl.classList.remove('correct', 'wrong');
      highlightExpectedKey();
    }, 300);
  }
}

function flashFeedback(color) {
  const overlay = document.getElementById('flash-overlay');
  overlay.className = 'flash-overlay ' + color;
  setTimeout(() => { overlay.className = 'flash-overlay'; }, 150);
}

// ============ NAVIGATION ============
function prevCountry() {
  if (currentIndex > 0) {
    currentIndex--;
    typedPos = completed[currentIndex] ? COUNTRIES[currentIndex].romaji.length : 0;
    updateDisplay();
  }
}

function nextCountry() {
  if (currentIndex < COUNTRIES.length - 1) {
    currentIndex++;
    typedPos = completed[currentIndex] ? COUNTRIES[currentIndex].romaji.length : 0;
    updateDisplay();
  }
}

// ============ CELEBRATION ============
function celebrate() {
  const container = document.getElementById('celebration');
  container.innerHTML = '';
  const colors = ['#FF9800','#4CAF50','#2196F3','#F44336','#9C27B0','#FFEB3B'];
  for (let i = 0; i < 20; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.4 + 's';
    c.style.width = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(c);
  }
  setTimeout(() => { container.innerHTML = ''; }, 1200);
}

// ============ RESULTS ============
function showResults() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'flex';
  document.getElementById('result-input').textContent = inputCount;
  document.getElementById('result-miss').textContent = missCount;
  const accuracy = inputCount > 0 ? Math.round(((inputCount - missCount) / inputCount) * 100) : 100;
  document.getElementById('result-accuracy').textContent = accuracy + '%';
}

// ============ PHYSICAL KEYBOARD SUPPORT ============
document.addEventListener('keydown', (e) => {
  if (document.getElementById('game-screen').style.display !== 'flex') return;
  const key = e.key.toLowerCase();
  if (/^[a-z0-9\-]$/.test(key)) {
    e.preventDefault();
    handleKey(key);
  }
});
</script>
</body>
</html>
